seed: 42
eval_steps: 50

model:
  name: flow_matching
  params:
    image_size: 128
    in_channels: 3
    sigma_min: 1.0e-4
    use_ot_coupling: true
    base_channels: 64
    channel_mults: [1, 2, 4]
    num_classes: 6

dataset:
  name: deeppcb
  root: data/DeepPCB
  image_size: 128

training:
  epochs: 200
  batch_size: 32
  num_workers: 4
  lr: 1.0e-4
  betas: [0.9, 0.95]
  weight_decay: 0.0
  amp: true
  grad_accum_steps: 2
  grad_clip: 1.0
  ema_decay: 0.9999
  log_every: 50
  wandb: false
  wandb_project: defectgen
